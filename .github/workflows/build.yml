name: Build OpenROAD + Run GCD

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    steps:
    - uses: actions/checkout@v4
      with:
        repository: The-OpenROAD-Project/OpenROAD-flow-scripts
        submodules: recursive

    - name: Install Dependencies
      run: |
        sudo rm /etc/apt/sources.list.d/yarn.list 2>/dev/null || true
        sudo ./etc/DependencyInstaller.sh -all

    - name: Build Tools
      run: ./build_openroad.sh --local --no_init

    - name: Run GCD Flow
      run: cd flow && make DESIGN_CONFIG=./designs/nangate45/gcd/config.mk

    - name: Upload Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: openroad-gcd-results
        path: |
          flow/logs/
          flow/reports/
          flow/results/
